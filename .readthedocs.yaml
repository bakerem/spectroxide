# Read the Docs configuration for spectroxide.
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
    rust: "1.75"
  jobs:
    post_install:
      - pip install -e ./python[doc]
    post_build:
      # Embed the Rust crate docs under html/rust/ so rust_api.rst
      # can link to rust/spectroxide/index.html.
      - cargo doc --manifest-path Cargo.toml --lib --no-deps
      - mkdir -p $READTHEDOCS_OUTPUT/html/rust
      - cp -R target/doc/. $READTHEDOCS_OUTPUT/html/rust/

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
